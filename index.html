<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#dccdb8">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon.png">
<title>玩具屋大黑洞</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; overscroll-behavior:none;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:#dccdb8; touch-action:none; user-select:none; -webkit-user-select:none; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  .hud { position:fixed; z-index:10; pointer-events:none; }
  .chip { background:rgba(255,255,255,.9); border-radius:14px; padding:6px 14px;
    box-shadow:0 2px 8px rgba(0,0,0,.14); }

  #timer { top:calc(10px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:6px; }
  #timer .val { font-size:20px; font-weight:800; color:#3a2e28; font-variant-numeric:tabular-nums; }
  #timer.hurry .val { color:#e0442c; }

  #score { top:calc(10px + env(safe-area-inset-top)); left:calc(12px + env(safe-area-inset-left)); }
  #score .val { font-size:19px; font-weight:800; color:#3a2e28; font-variant-numeric:tabular-nums;
    display:inline-block; transition:transform .12s; }
  #score .val.bump { transform:scale(1.35); }
  #score .lab { font-size:11px; color:#8a7362; font-weight:700; display:block; line-height:1; margin-bottom:2px; }

  #board { top:calc(10px + env(safe-area-inset-top)); right:calc(12px + env(safe-area-inset-right));
    padding:7px 12px; min-width:118px; }
  #board .row { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700;
    color:#3a2e28; line-height:1.55; font-variant-numeric:tabular-nums; }
  #board .dot { width:9px; height:9px; border-radius:50%; flex:none; }
  #board .nm { flex:1; }
  #board .row.me .nm { color:#e0742c; }

  #lvlWrap { bottom:calc(14px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:8px; }
  #lvlWrap .lv { font-size:14px; font-weight:800; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.4); }
  #lvlBar { width:min(44vw,240px); height:10px; border-radius:6px; background:rgba(0,0,0,.28); overflow:hidden; }
  #lvlFill { height:100%; width:0%; border-radius:6px; background:linear-gradient(90deg,#ffb545,#ff8c3a); transition:width .25s; }

  #muteBtn { position:fixed; z-index:11; bottom:calc(12px + env(safe-area-inset-bottom));
    right:calc(12px + env(safe-area-inset-right)); width:42px; height:42px; border-radius:50%;
    background:rgba(255,255,255,.85); border:none; font-size:20px; cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.15); }

  #joy { position:fixed; z-index:9; width:104px; height:104px; border-radius:50%;
    border:3px solid rgba(255,255,255,.65); background:rgba(255,255,255,.14);
    pointer-events:none; display:none; transform:translate(-50%,-50%); }
  #joyKnob { position:fixed; z-index:9; width:46px; height:46px; border-radius:50%;
    background:rgba(255,255,255,.75); box-shadow:0 2px 6px rgba(0,0,0,.25);
    pointer-events:none; display:none; transform:translate(-50%,-50%); }

  #hint { position:fixed; bottom:calc(52px + env(safe-area-inset-bottom)); left:50%;
    transform:translateX(-50%); z-index:10; background:rgba(58,46,40,.82); color:#fff;
    font-size:14px; padding:8px 18px; border-radius:20px; pointer-events:none;
    transition:opacity .6s; white-space:nowrap; }

  #respawn { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:rgba(120,20,10,.32); pointer-events:none; }
  #respawn h2 { color:#fff; font-size:30px; text-shadow:0 2px 8px rgba(0,0,0,.5); margin-bottom:8px; }
  #respawn .cnt { color:#fff; font-size:54px; font-weight:800; text-shadow:0 2px 8px rgba(0,0,0,.5); }

  #overlay { position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:rgba(45,30,22,.8);
    backdrop-filter:blur(6px); text-align:center; padding:24px; }
  #overlay .big { font-size:56px; margin-bottom:8px; }
  #overlay h1 { color:#fff; font-size:32px; margin-bottom:8px; letter-spacing:1px; }
  #overlay p { color:#ffe; font-size:16px; margin-bottom:8px; opacity:.92; }
  #overlay #ovBoard { margin:14px 0 22px; background:rgba(255,255,255,.1); border-radius:14px;
    padding:12px 22px; }
  #overlay #ovBoard .row { display:flex; align-items:center; gap:10px; color:#fff;
    font-size:17px; font-weight:700; line-height:1.9; font-variant-numeric:tabular-nums; }
  #overlay #ovBoard .dot { width:11px; height:11px; border-radius:50%; }
  #overlay #ovBoard .nm { min-width:64px; text-align:left; }
  .btn { pointer-events:auto; cursor:pointer; border:none; background:#ff9f4a;
    color:#fff; font-size:20px; font-weight:700; padding:15px 46px; border-radius:30px;
    box-shadow:0 5px 0 #d9752b; transition:transform .08s, box-shadow .08s; font-family:inherit; }
  .btn:active { transform:translateY(4px); box-shadow:0 1px 0 #d9752b; }

  #modeSel { position:fixed; inset:0; z-index:35; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:rgba(45,30,22,.82);
    backdrop-filter:blur(6px); text-align:center; padding:24px; }
  #modeSel .logo { font-size:64px; margin-bottom:4px; }
  #modeSel h1 { color:#fff; font-size:34px; margin-bottom:6px; letter-spacing:2px; }
  #modeSel p.sub { color:#ffe; opacity:.85; font-size:15px; margin-bottom:30px; }
  .modeBtn { pointer-events:auto; cursor:pointer; border:none; font-family:inherit;
    width:min(78vw,340px); margin:9px 0; padding:16px 22px; border-radius:20px;
    text-align:left; display:flex; align-items:center; gap:14px;
    box-shadow:0 5px 0 rgba(0,0,0,.25); transition:transform .08s, box-shadow .08s; }
  .modeBtn:active { transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.25); }
  .modeBtn .ico { font-size:34px; }
  .modeBtn .t { font-size:20px; font-weight:800; color:#fff; }
  .modeBtn .d { font-size:13px; color:rgba(255,255,255,.85); margin-top:2px; }
  #btnBattle { background:#ff9f4a; box-shadow:0 5px 0 #d9752b; }
  #btnEndless { background:#7b6cf6; box-shadow:0 5px 0 #5747c9; }

  #endBtn { position:fixed; z-index:11; top:calc(10px + env(safe-area-inset-top));
    left:calc(50% + 74px); width:38px; height:38px; border-radius:50%;
    background:rgba(255,255,255,.85); border:none; font-size:17px; cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.15); }

  #loading { position:fixed; inset:0; z-index:40; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:#dccdb8; }
  #loading .spin { width:46px; height:46px; border:5px solid #c4ad92; border-top-color:#ff9f4a;
    border-radius:50%; animation:sp 1s linear infinite; margin-bottom:18px; }
  @keyframes sp { to { transform:rotate(360deg); } }
  #loading p { color:#6b5344; font-size:16px; font-weight:600; }
  #loading .sub { font-size:12px; color:#93816e; margin-top:8px; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="app"></div>

<div id="timer" class="hud chip"><span>⏱️</span><span class="val" id="timerVal">2:00</span></div>
<div id="score" class="hud chip"><span class="lab">分數</span><span class="val" id="scoreVal">0</span></div>
<div id="board" class="hud chip"></div>
<div id="lvlWrap" class="hud"><span class="lv" id="lvlText">LV 1</span><div id="lvlBar"><div id="lvlFill"></div></div></div>
<button id="muteBtn">🔊</button>
<button id="endBtn" class="hidden">🏁</button>

<div id="modeSel" class="hidden">
  <div class="logo">🕳️</div>
  <h1>玩具屋大黑洞</h1>
  <p class="sub">操控黑洞,把整間玩具屋吃光光!</p>
  <button class="modeBtn" id="btnBattle"><span class="ico">⚔️</span>
    <span><span class="t">對戰模式</span><br><span class="d">2 分鐘,和小藍小綠搶著吃,分數定勝負</span></span>
  </button>
  <button class="modeBtn" id="btnEndless"><span class="ico">♾️</span>
    <span><span class="t">無限模式</span><br><span class="d">沒有時限,越吃越大,世界也跟著一起長大</span></span>
  </button>
</div>

<div id="joy"></div><div id="joyKnob"></div>
<div id="hint">按住畫面任意處拖曳,操控黑洞吞掉玩具屋!</div>

<div id="respawn" class="hidden"><h2>被吞掉了!</h2><div class="cnt" id="respawnCnt">3</div></div>

<div id="overlay" class="hidden">
  <div class="big" id="ovIcon">🏆</div>
  <h1 id="ovTitle">時間到!</h1>
  <p id="ovDesc"></p>
  <div id="ovBoard"></div>
  <button class="btn" id="restartBtn">再玩一次</button>
</div>

<div id="loading"><div class="spin"></div><p id="loadingText">正在把玩具屋搬進來…</p><p class="sub">第一次載入需要一點時間</p></div>

<script type="importmap">
{ "imports": {
  "three": "./lib/three.module.js",
  "three/addons/": "./lib/"
}}
</script>
<script type="module" src="./game.js?v=5"></script>

<!-- PWA:註冊 Service Worker(離線可玩、可加到主畫面) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
